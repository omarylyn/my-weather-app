<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>
    <link rel="stylesheet" href="style.css">
     <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
</head>
<body>

    <div class="container">
        <div class="search-row">
    <input type="text" id="input-box" placeholder="Search city...">
    <button id="searchBtn" onclick="getWeather()">Search</button>
    </div>

    <div class="main-card">
        <div class="top info">
            <div>
    <h3 id="country">KENYA</h3>
    <h2 id="city">Nairobi</h2>
        </div>

    <h2 id="temp">24°C</h2> 

    <p id="condition">PARTLY CLOUDY ⛅</p>

     <div class="extra-info">

        <div>
    <p id="humidity">72%</p>
    <span>HUMIDITY</span>
    </div>

     <div>
     <p id="wind">14 km/h</p>
            <span>WIND</span>
            </div>

      <div>
      <p id="feels">22°</p>
            <span>FEELS LIKE</span>

    </div>

      </div>

      </div>


    <div class="bottom-row">

    <div class="card">
        <img src="images/sunrise.png" alt="SUNRISE">
        <p>6.18 AM</p>
        <p>SUNRISE</p>

        </div>



        <div class="card">
        <img src="images/sunset.png" alt="SUNSE">
        <p>6.44PM</p>
        <p>SUNSET</p>

        </div>

         <div class="card">
        <img src="images/visibility.png" alt="VISIBILITY">
        <p>10KM </p>
        <p>VISIBILITY</p>

    </div>

    

    
        

    </div>


    </div>

    
    

    






    <script src="script.js">
        







    </script>
    
</body>
</html>
